---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pr0d1r2/nix-lefthook-ci-action@ce9a118b05e90e186dba48a82067adeed185f7d4
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-lefthook: 'true'
      - name: Smoke-test cavemem binary
        run: |
          nix build
          ./result/bin/cavemem --help

  build-linux-arm:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v7
      - uses: pr0d1r2/nix-lefthook-ci-action@ce9a118b05e90e186dba48a82067adeed185f7d4
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-lefthook: 'true'
      - name: Smoke-test cavemem binary
        run: |
          nix build
          ./result/bin/cavemem --help

  build-macos:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pr0d1r2/nix-lefthook-ci-action@ce9a118b05e90e186dba48a82067adeed185f7d4
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skip-lefthook: 'true'
      - name: Smoke-test cavemem binary
        run: |
          nix build
          ./result/bin/cavemem --help
